name: moveon
description: 动起来（MoveOn）- 面向健身人群的桌面运动应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 状态管理 — 轻量、适合本项目的规模
  provider: ^6.1.1
  # SQLite 本地数据库 — Windows 桌面需用 FFI 版本
  sqflite_common_ffi: ^2.3.0
  # 文件路径 — 获取应用数据目录
  path_provider: ^2.1.1
  # TTS 语音合成 — 调用 Windows 系统语音引擎
  flutter_tts: ^3.8.3
  # 视频播放 — Windows 桌面使用 video_player_win 实现
  video_player: ^2.8.1
  video_player_win: ^3.2.2
  # 轻量键值存储 — 保存登录状态、用户偏好
  shared_preferences: ^2.2.2
  # 密码哈希 — 单向加密存储密码
  crypto: ^3.0.3
  # 日期格式化 — 模组创建时间等
  intl: ^0.19.0
  # 路径拼接 — 数据库文件路径构造
  path: ^1.8.3
  # 音频播放 — 倒计时提示音 + 完成语音
  audioplayers: ^6.0.0
  # Google Fonts — Noto Sans SC 中文字体
  google_fonts: ^6.1.0
  # URL 启动器 — 调用系统浏览器打开外部链接
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
    - assets/audio/
    - assets/images/category_icons/
